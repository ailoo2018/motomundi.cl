####################################################################################################
# local server — zero-downtime deploy via blue-green directory swap
####################################################################################################
name: Remote Deploy
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted
    env:
      LIVE_DIR: 'e:\www.motomundi.cl'         # your current live path
      STAGE_DIR: 'e:\staging_motomundi' # build goes here first
      OLD_DIR: 'e:\_old_motomundi'       # previous release (rollback target)
      APP_POOL: 'nuxt'                           # your IIS application pool name

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clean staging directory
        run: |
          if (Test-Path "$env:STAGE_DIR") {
            Remove-Item -Recurse -Force "$env:STAGE_DIR"
          }
          New-Item -ItemType Directory -Path "$env:STAGE_DIR"
        shell: powershell

      - name: Debug working directory
        run: |
          Get-Location
          dir
        shell: powershell
      # ── Build happens here while the live site is still running ──────────────
      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build

      # ── Copy build output + config into staging ──────────────────────────────
      - name: Stage the build
        run: |
          # Adjust .output or dist to wherever Nuxt puts the build
          robocopy .output "$env:STAGE_DIR" /E /NFL /NDL /NJH /NJS
          Copy-Item "E:\configs\web.config" "$env:STAGE_DIR\web.config" -Force
        shell: powershell

      # ── Swap (this is the only moment the site is briefly unavailable) ───────
      - name: Swap directories (atomic)
        run: |
          # Stop the app pool — takes < 2 seconds
          & "$env:SystemRoot\system32\inetsrv\appcmd.exe" stop apppool "$env:APP_POOL"

          # Archive the current live dir for instant rollback
          if (Test-Path "$env:OLD_DIR") {
            Remove-Item -Recurse -Force "$env:OLD_DIR"
          }
          if (Test-Path "$env:LIVE_DIR") {
            Rename-Item "$env:LIVE_DIR" "$env:OLD_DIR"
          }

          # Promote staging to live
          Rename-Item "$env:STAGE_DIR" "$env:LIVE_DIR"

          # Restart the app pool
          & "$env:SystemRoot\system32\inetsrv\appcmd.exe" start apppool "$env:APP_POOL"

          Write-Host "Swap complete. Site is live."
        shell: powershell

      # ── Optional: rollback step you can trigger manually if needed ───────────
      - name: Verify site is up
        run: |
          Start-Sleep -Seconds 5
          $response = Invoke-WebRequest -Uri "http://www2.motomundi.cl" -UseBasicParsing -TimeoutSec 15
          if ($response.StatusCode -ne 200) {
            Write-Error "Site check failed! Rolling back..."

            & "$env:SystemRoot\system32\inetsrv\appcmd.exe" stop apppool "$env:APP_POOL"
            Remove-Item -Recurse -Force "$env:LIVE_DIR"
            Rename-Item "$env:OLD_DIR" "$env:LIVE_DIR"
            & "$env:SystemRoot\system32\inetsrv\appcmd.exe" start apppool "$env:APP_POOL"

            exit 1
          }
          Write-Host "Site responded with 200 OK."
        shell: powershell
