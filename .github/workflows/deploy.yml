name: Remote Deploy
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: self-hosted
    env:
      LIVE_DIR: 'e:\www.motomundi.cl'
      STAGE_DIR: 'e:\staging_motomundi'
      OLD_DIR: 'e:\_old_motomundi'
      APP_POOL: 'nuxt'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false      # ← don't delete node_modules on checkout

      # ── Cache node_modules, pnpm store AND nuxt build cache ──────────────
      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Cache dependencies and build cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
            node_modules
            node_modules/.cache/nuxt
          key: build-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('nuxt.config.ts') }}
          restore-keys: |
            build-${{ hashFiles('pnpm-lock.yaml') }}-
            build-

      # ─────────────────────────────────────────────────────────────────────

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Clean staging directory
        run: |
          if (Test-Path "$env:STAGE_DIR") {
            Remove-Item -Recurse -Force "$env:STAGE_DIR"
          }
          New-Item -ItemType Directory -Path "$env:STAGE_DIR"
        shell: powershell

      - name: Stage the build
        run: |
          robocopy .output "$env:STAGE_DIR\.output" /E /NFL /NDL /NJH /NJS
          if ($LASTEXITCODE -le 7) { $LASTEXITCODE = 0 }
          Copy-Item "E:\configs\web.config" "$env:STAGE_DIR\web.config" -Force
          Copy-Item "run.cjs" "$env:STAGE_DIR\run.cjs" -Force
        shell: powershell

      - name: Swap directories (atomic)
        run: |
          # Stop app pool only if running
          $state = & "$env:SystemRoot\system32\inetsrv\appcmd.exe" list apppool "nuxt"
          if ($state -match "state:Started") {
            & "$env:SystemRoot\system32\inetsrv\appcmd.exe" stop apppool "$env:APP_POOL"
            Write-Host "App pool stopped."
          } else {
            Write-Host "App pool was already stopped."
          }
          

          # Wait for OS to release all file handles
          Write-Host "Waiting for file handles to release..."
          Start-Sleep -Seconds 2
          
          # Rename with retry loop
          if (Test-Path "$env:OLD_DIR") {
            Remove-Item -Recurse -Force "$env:OLD_DIR"
          }
          
          if (Test-Path "$env:LIVE_DIR") {
            $retries = 5
            $success = $false
            while ($retries -gt 0 -and -not $success) {
              try {
                Rename-Item "$env:LIVE_DIR" "$env:OLD_DIR" -ErrorAction Stop
                $success = $true
                Write-Host "Rename successful."
              } catch {
                Write-Host "Rename failed, retrying in 5s... ($retries attempts left)"
                Start-Sleep -Seconds 5
                $retries--
              }
            }
            if (-not $success) {
              Write-Error "Could not rename live dir after multiple attempts."
              exit 1
            }
          }
          
          # Promote staging to live
          Rename-Item "$env:STAGE_DIR" "$env:LIVE_DIR"
          
          # Restart the app pool
          & "$env:SystemRoot\system32\inetsrv\appcmd.exe" start apppool "$env:APP_POOL"
          Write-Host "Swap complete. Site is live."
        shell: powershell

      - name: Verify site is up
        run: |
          Start-Sleep -Seconds 5
          $response = Invoke-WebRequest -Uri "http://www2.motomundi.cl" -UseBasicParsing -TimeoutSec 15
          if ($response.StatusCode -ne 200) {
            Write-Error "Site check failed! Rolling back..."
            & "$env:SystemRoot\system32\inetsrv\appcmd.exe" stop apppool "$env:APP_POOL"
            Remove-Item -Recurse -Force "$env:LIVE_DIR"
            Rename-Item "$env:OLD_DIR" "$env:LIVE_DIR"
            & "$env:SystemRoot\system32\inetsrv\appcmd.exe" start apppool "$env:APP_POOL"
            exit 1
          }
          Write-Host "Site responded with 200 OK."
        shell: powershell
